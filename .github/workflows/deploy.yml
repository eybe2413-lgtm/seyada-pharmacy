name: Build & Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyDI2JDmE5FLxYulboTfirIMZM_FhwyLaJY
          VITE_FIREBASE_AUTH_DOMAIN: seyade-pharmacy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: seyade-pharmacy
          VITE_FIREBASE_STORAGE_BUCKET: seyade-pharmacy.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "283403663670"
          VITE_FIREBASE_APP_ID: 1:283403663670:web:dd2a2f8bd7e4fe9e951b97

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: seyade-pharmacy
